version: '3.8'

# C-05 FIX: All credentials and secrets are sourced from environment variables.
# Copy .env.example to .env and fill in all required values before running.
# NEVER commit .env to version control.

services:
  db:
    image: postgres:15-alpine
    container_name: cygnal_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cygnal} -d ${POSTGRES_DB:-cygnal_prod}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cygnal_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: cygnal_backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:?error}:${POSTGRES_PASSWORD:?error}@db:5432/${POSTGRES_DB:?error}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - USE_CELERY=${USE_CELERY:-true}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - CYGNAL_WEBHOOK_SECRET=${CYGNAL_WEBHOOK_SECRET:?CYGNAL_WEBHOOK_SECRET is required}
      - CYGNAL_ADMIN_USERNAME=${CYGNAL_ADMIN_USERNAME}
      - CYGNAL_ADMIN_PASSWORD=${CYGNAL_ADMIN_PASSWORD}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_volume:/app/uploads

  celery_worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: cygnal_celery_worker
    command: celery -A celery_app.celery worker --loglevel=info --pool=threads
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:?error}:${POSTGRES_PASSWORD:?error}@db:5432/${POSTGRES_DB:?error}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - USE_CELERY=${USE_CELERY:-true}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - CYGNAL_WEBHOOK_SECRET=${CYGNAL_WEBHOOK_SECRET:?CYGNAL_WEBHOOK_SECRET is required}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_volume:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cygnal_frontend
    environment:
      - BACKEND_URL=http://backend:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads_volume:
