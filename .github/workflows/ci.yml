name: Cygnal CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Backend CI — Python / Flask
  # ─────────────────────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend CI (Python 3.11)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: requirements.txt

    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Verify Python Syntax (Dynamic Compilation)
      working-directory: api
      run: |
        python -m compileall -f -q -x "venv|tests|\.pytest_cache" .


    - name: Run Backend Test Suite
      working-directory: api
      env:
        PYTHONPATH: ${{ github.workspace }}/api
      run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend CI — Next.js / TypeScript
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI (Node.js 20)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: frontend
      run: npm ci

    - name: Run Production Build Verification
      working-directory: frontend
      run: npm run build
