name: Cygnal 2.0 Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-ci:
    name: Backend CI (Python)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f api/requirements.txt ]; then
          pip install -r api/requirements.txt
        elif [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

    - name: Verify Python Syntax & Compilations
      run: |
        python -m py_compile api/backend.py api/database.py api/task_manager.py api/port_scanner.py

  frontend-ci:
    name: Frontend CI (Next.js)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: frontend
      run: npm ci

    - name: Run Build Verification
      working-directory: frontend
      run: npm run build
