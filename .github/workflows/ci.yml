name: Cygnal CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Backend CI — Python / Flask
  # ─────────────────────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend CI (Python 3.11)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: requirements.txt

    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Verify Python Syntax (Dynamic Compilation)
      working-directory: api
      run: |
        python -m compileall -f -q -x "venv|tests|\.pytest_cache" .


    - name: Verify Requirements Imports
      run: |
        python -c "import fitz; print('fitz imported successfully')"
        python -c "import whois; print('whois imported successfully')"
        python -c "import docx; print('docx imported successfully')"
        python -c "import selenium; print('selenium imported successfully')"
        python -c "import bs4; print('bs4 imported successfully')"
        python -c "import lxml; print('lxml imported successfully')"
        python -c "import bcrypt; print('bcrypt imported successfully')"
        python -c "import jwt; print('jwt imported successfully')"

    - name: Run Backend Test Suite
      working-directory: api
      env:
        PYTHONPATH: ${{ github.workspace }}/api
        JWT_SECRET: f4a0a4c0709b114d60c410b001a1c1d1e1f185220b0b1a0d81014e2030f0e0d0c0b0a0908070605040302010
      run: |
        pytest tests/ -v || { echo "=== CYGNAL BACKEND LOG ==="; [ -f cygnal_backend.log ] && cat cygnal_backend.log || echo "No log file found"; exit 1; }


  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend CI — Next.js / TypeScript
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI (Node.js 20)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: frontend
      run: npm ci

    - name: Run Production Build Verification
      working-directory: frontend
      run: npm run build
